name: Android build (signed AAB / debug APK)
run-name: "Android • ${{ inputs.target }} • ${{ inputs.ref || github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to build"
        type: choice
        required: true
        default: release_aab
        options:
        - release_aab
        - release_apk
        - debug_apk
        - dev_apk
      ref:
        # ПУСТО по умолчанию: checkout использует `ref: ${{ inputs.ref }}`, а пустой ref в actions/checkout
        # означает «ветка/SHA, запустившие workflow» (при dispatch — ветка, на которой запущен). Раньше
        # default="master" ЖЁСТКО собирал master даже при dispatch на фиче (баг: debug/AAB 0.3.12 собрались
        # с master/0.3.0). Явно указанный ref (ветка/тег/sha) по-прежнему уважается.
        description: "Git ref (branch/tag/sha). Пусто = ветка, на которой запущен workflow."
        required: false
        default: ""

jobs:
  build:
    name: "Build (${{ inputs.target }})"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Configure build
      id: cfg
      shell: bash
      run: |
        set -euo pipefail
        case "${{ inputs.target }}" in
          release_aab)
            echo "gradle_task=bundleRelease" >> "$GITHUB_OUTPUT"
            echo "kind=aab" >> "$GITHUB_OUTPUT"
            echo "artifact_name=release-aab" >> "$GITHUB_OUTPUT"
            echo "needs_signing=true" >> "$GITHUB_OUTPUT"
            ;;
          release_apk)
            # assembleRelease даёт UNSIGNED APK → подписываем защищённым релиз-ключом из секретов
            # (ANDROID_KEYSTORE_BASE64) через zipalign+apksigner. Ключ НЕ в репозитории.
            echo "gradle_task=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "kind=apk_release" >> "$GITHUB_OUTPUT"
            echo "artifact_name=release-apk" >> "$GITHUB_OUTPUT"
            echo "needs_signing=true" >> "$GITHUB_OUTPUT"
            ;;
          debug_apk)
            echo "gradle_task=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "kind=apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=debug-apk" >> "$GITHUB_OUTPUT"
            echo "needs_signing=false" >> "$GITHUB_OUTPUT"
            ;;
          dev_apk)
            # DEV-сборка нового дизайна (applicationId mayakvpn.app.dev, метка «Маяк VPN dev»): ставится
            # РЯДОМ с прод-приложением для сравнения. Подписана стабильным mayakdebug-ключом в gradle → без CI-подписи.
            echo "gradle_task=assembleDev" >> "$GITHUB_OUTPUT"
            echo "kind=apk_dev" >> "$GITHUB_OUTPUT"
            echo "artifact_name=dev-apk" >> "$GITHUB_OUTPUT"
            echo "needs_signing=false" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "Unknown target: ${{ inputs.target }}" >&2
            exit 1
            ;;
        esac

    - name: Decode keystore from secret
      if: ${{ steps.cfg.outputs.needs_signing == 'true' }}
      shell: bash
      env:
        KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        set -euo pipefail
        if [[ -z "${KEYSTORE_B64}" ]]; then
          echo "Missing secret ANDROID_KEYSTORE_BASE64" >&2
          exit 1
        fi
        echo "${KEYSTORE_B64}" | base64 --decode > release.keystore.jks
        echo "KEYSTORE_PATH=${PWD}/release.keystore.jks" >> "$GITHUB_ENV"

    - name: Build
      shell: bash
      run: |
        set -euo pipefail
        chmod +x ./gradlew
        ./gradlew --no-daemon --stacktrace ${{ steps.cfg.outputs.gradle_task }}

    - name: Locate built artifact
      id: locate
      shell: bash
      run: |
        set -euo pipefail
        
        case "${{ steps.cfg.outputs.kind }}" in
          aab) FILE="./ui/build/outputs/bundle/release/ui-release.aab" ;;
          apk_release)
            FILE="./ui/build/outputs/apk/release/ui-release-unsigned.apk"
            [[ -f "${FILE}" ]] || FILE="./ui/build/outputs/apk/release/ui-release.apk"
            ;;
          apk_dev) FILE="./ui/build/outputs/apk/dev/ui-dev.apk" ;;
          *) FILE="./ui/build/outputs/apk/debug/ui-debug.apk" ;;
        esac

        if [[ ! -f "${FILE}" ]]; then
          echo "Built file not found: ${FILE}" >&2
          ls -R ./ui/build/outputs || true
          exit 1
        fi

        echo "built_file=${FILE}" >> "$GITHUB_OUTPUT"

    - name: Sign AAB
      if: ${{ steps.cfg.outputs.kind == 'aab' }}
      id: sign
      shell: bash
      env:
        KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      run: |
        set -euo pipefail
        
        AAB="${{ steps.locate.outputs.built_file }}"
        SIGNED_AAB="${AAB%.aab}-signed.aab"
        
        if [[ -z "${KEYSTORE_PASSWORD}" || -z "${KEY_ALIAS}" ]]; then
          echo "Missing one of secrets: ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS" >&2
          exit 1
        fi
        
        jarsigner \
          -keystore "${KEYSTORE_PATH}" \
          -storetype PKCS12 \
          -storepass "${KEYSTORE_PASSWORD}" \
          -signedjar "${SIGNED_AAB}" \
          "${AAB}" \
          "${KEY_ALIAS}"
        
        echo "final_file=${SIGNED_AAB}" >> "$GITHUB_OUTPUT"

    - name: Sign release APK
      if: ${{ steps.cfg.outputs.kind == 'apk_release' }}
      id: signapk
      shell: bash
      env:
        KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      run: |
        set -euo pipefail
        if [[ -z "${KEYSTORE_PASSWORD}" || -z "${KEY_ALIAS}" ]]; then
          echo "Missing one of secrets: ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS" >&2
          exit 1
        fi
        UNSIGNED="${{ steps.locate.outputs.built_file }}"
        SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
        BT="$(ls -d "${SDK}"/build-tools/* 2>/dev/null | sort -V | tail -1)"
        if [[ -z "${BT}" ]]; then echo "build-tools not found under ${SDK}" >&2; exit 1; fi
        echo "Using build-tools: ${BT}"
        ALIGNED="${UNSIGNED%.apk}-aligned.apk"
        SIGNED="${PWD}/mayakvpn-release-signed.apk"
        "${BT}/zipalign" -p -f 4 "${UNSIGNED}" "${ALIGNED}"
        "${BT}/apksigner" sign \
          --ks "${KEYSTORE_PATH}" \
          --ks-pass "pass:${KEYSTORE_PASSWORD}" \
          --ks-key-alias "${KEY_ALIAS}" \
          --key-pass "pass:${KEYSTORE_PASSWORD}" \
          --out "${SIGNED}" \
          "${ALIGNED}"
        "${BT}/apksigner" verify --print-certs "${SIGNED}"
        echo "final_file=${SIGNED}" >> "$GITHUB_OUTPUT"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.cfg.outputs.artifact_name }}
        path: ${{ steps.sign.outputs.final_file || steps.signapk.outputs.final_file || steps.locate.outputs.built_file }}
        if-no-files-found: error
